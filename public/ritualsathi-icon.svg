<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Diagonal brand gradient: orange -> green (matches "Ritual"/"Sathi" logo split) -->
    <linearGradient id="rsBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1973D"/>
      <stop offset="55%" stop-color="#F1973D"/>
      <stop offset="100%" stop-color="#05A702"/>
    </linearGradient>
    <!-- Very soft drop shadow for premium feel -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0" dy="0.8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Tile inner glow (subtle) -->
    <linearGradient id="tileGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFF7EE" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- White-ish tile with rounded corners + faint brand-tinted hairline edge -->
  <rect width="64" height="64" rx="14" ry="14"
        fill="url(#tileGlow)"
        stroke="#F1973D"
        stroke-opacity="0.18"
        stroke-width="1"/>

  <!-- Tiny accent dot in brand green at top-right for character -->
  <circle cx="50" cy="14" r="2.6" fill="#05A702" opacity="0.85"/>

  <!-- Devanagari letter र (ra), filled with the brand gradient -->
  <text x="50%" y="60%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="'Noto Sans Devanagari', 'Mangal', 'Nirmala UI', 'Aparajita', 'Devanagari Sangam MN', 'Kohinoor Devanagari', sans-serif"
        font-weight="800"
        font-size="50"
        fill="url(#rsBrand)"
        filter="url(#softShadow)">र</text>
</svg>
